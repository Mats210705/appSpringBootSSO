version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s  # Keycloak tarda en arrancar

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Dentro de Docker, keycloak es el nombre del servicio en puerto interno 8080
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/sso-realm
      # El redirect va al browser del usuario, entonces sigue siendo localhost
      APP_BASE_URL: http://localhost:8080
    depends_on:
      keycloak:
        condition: service_healthy