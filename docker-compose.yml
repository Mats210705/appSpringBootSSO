version: '3.8'
services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_URL: http://localhost:8180
      KC_HOSTNAME_ADMIN_URL: http://localhost:8180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8180:8080"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Backend → Keycloak (red interna Docker)
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/sso-realm
      # Issuer que viene dentro de los tokens (URL pública)
      KEYCLOAK_PUBLIC_ISSUER_URI: http://localhost:8180/realms/sso-realm
      # Redirect del browser
      APP_BASE_URL: http://localhost:8080
    depends_on:
      - keycloak
    restart: on-failure
