spring.security.oauth2.client.registration.keycloak.client-id=sso-app
spring.security.oauth2.client.registration.keycloak.client-secret=ZjoAtEkhmHie2yJf6FPQhj5QEokqsra2
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email,roles
spring.security.oauth2.client.registration.keycloak.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/keycloak
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code

# En lugar de issuer-uri, configuramos cada endpoint manualmente
spring.security.oauth2.client.provider.keycloak.authorization-uri=${KEYCLOAK_PUBLIC_URL:http://localhost:8180}/realms/sso-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_INTERNAL_URL:http://localhost:8180}/realms/sso-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=${KEYCLOAK_INTERNAL_URL:http://localhost:8180}/realms/sso-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-info-uri=${KEYCLOAK_INTERNAL_URL:http://localhost:8180}/realms/sso-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.end-session-uri=${KEYCLOAK_PUBLIC_URL:http://localhost:8180}/realms/sso-realm/protocol/openid-connect/logout
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
