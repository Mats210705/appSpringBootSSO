<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body class="bg-light">
        <div class="container mt-5 text-center">
            <div class="card p-5 shadow">
                <h1>🔐 SSO con Keycloak</h1>
                <p class="text-muted">Accedé de forma segura con tu cuenta</p>

                <!-- Si ya está logueado, redirigir -->
                <div sec:authorize="isAuthenticated()">
                    <a href="/dashboard" class="btn btn-success">Ir al Dashboard</a>
                </div>

                <!-- Si no está logueado -->
                <div sec:authorize="isAnonymous()">
                    <a href="/oauth2/authorization/keycloak" class="btn btn-primary btn-lg">
                        Iniciar sesión con Keycloak
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
